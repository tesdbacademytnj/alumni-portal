<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job posting unpublished</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f3fb;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f3fb;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;max-width:480px;width:100%;">
          <tr>
            <td style="background:#1A3A6B;padding:28px 32px;text-align:center;">
              <span style="font-size:22px;font-weight:800;color:#ffffff;">AlumniPortal</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 8px 0;font-size:16px;color:#111827;">Hi {{ full_name }},</p>
              <p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;line-height:1.6;">
                Your job posting <strong>"{{ job_title }}"</strong> at <strong>{{ job_company }}</strong> has been unpublished by an administrator and sent back for review.
              </p>
              <p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;line-height:1.6;">
                Please log in to your dashboard to review and make any necessary changes.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background:#f9fafb;text-align:center;">
              <span style="font-size:12px;color:#9ca3af;">© AlumniPortal — Institute Alumni Network</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
